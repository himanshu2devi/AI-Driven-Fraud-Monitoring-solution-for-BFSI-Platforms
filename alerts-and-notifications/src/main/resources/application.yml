  kafka:
    consumer:
      enable-auto-commit: ${KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:false}
      auto-commit-interval-ms: ${KAFKA_CONSUMER_AUTO_COMMIT_INTERVAL_MS:5000}
      session-timeout-ms: ${KAFKA_CONSUMER_SESSION_TIMEOUT_MS:45000}
      heartbeat-interval-ms: ${KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS:3000}
      max-poll-records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:500}
