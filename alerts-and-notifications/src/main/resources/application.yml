      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SECURITY_SASL_MECHANISM:PLAIN}



application:
  kafka:
    notification-consumer-topic: ${KAFKA_TOPIC_NOTIFICATION_CONSUMER:notification-consumer-topic}
    process-message-threadpool-size: ${PROCESS_MESSAGE_THREADPOOL_SIZE:25}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:asset-rest-service}


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

kafka:
  transaction:
    topic: transaction-notification
    servers: localhost:9092
    ssl_endpoint_algorithm: ""
